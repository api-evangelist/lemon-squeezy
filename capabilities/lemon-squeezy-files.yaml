naftiko: 1.0.0-alpha2
info:
  label: Lemon Squeezy API — Files
  description: 'Lemon Squeezy API — Files. 2 operations. Lead operation: Lemon Squeezy List all files. Self-contained Naftiko
    capability covering one Lemon Squeezy business surface.'
  tags:
  - Lemon Squeezy
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LEMON_SQUEEZY_API_KEY: LEMON_SQUEEZY_API_KEY
capability:
  consumes:
  - type: http
    namespace: lemon-squeezy-files
    baseUri: https://api.lemonsqueezy.com
    description: Lemon Squeezy API — Files business capability. Self-contained, no shared references.
    resources:
    - name: v1-files
      path: /v1/files
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy List all files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-files-1
      path: /v1/files/1
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy Retrieve a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LEMON_SQUEEZY_API_KEY}}'
  exposes:
  - type: rest
    namespace: lemon-squeezy-files-rest
    port: 8080
    description: REST adapter for Lemon Squeezy API — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/files
      name: v1-files
      description: REST surface for v1-files.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy List all files
        call: lemon-squeezy-files.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/files/1
      name: v1-files-1
      description: REST surface for v1-files-1.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy Retrieve a file
        call: lemon-squeezy-files.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lemon-squeezy-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lemon Squeezy API — Files. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lemon-squeezy-list-all-files
      description: Lemon Squeezy List all files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-files.get
      outputParameters:
      - type: object
        mapping: $.
    - name: lemon-squeezy-retrieve-file
      description: Lemon Squeezy Retrieve a file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-files.get
      outputParameters:
      - type: object
        mapping: $.
