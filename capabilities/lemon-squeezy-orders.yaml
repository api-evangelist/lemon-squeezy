      name: v1-orders
      description: REST surface for v1-orders.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy List all orders
        call: lemon-squeezy-orders.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/orders/1
      name: v1-orders-1
      description: REST surface for v1-orders-1.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy Retrieve an order
        call: lemon-squeezy-orders.get
        outputParameters:
        - type: object
          mapping: $.
