    resources:
    - name: v1-products
      path: /v1/products
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy List all products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-products-1
      path: /v1/products/1
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy Retrieve a product
        outputRawFormat: json
