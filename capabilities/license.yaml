naftiko: 1.0.0-alpha2
info:
  label: Lemon Squeezy License API
  description: 'Lemon Squeezy License API. 3 operations. Lead operation: Lemon Squeezy Activate a license key. Self-contained
    Naftiko capability covering one Lemon Squeezy business surface.'
  tags:
  - Lemon Squeezy
  - Lemon Squeezy License API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LEMON_SQUEEZY_API_KEY: LEMON_SQUEEZY_API_KEY
capability:
  consumes:
  - type: http
    namespace: license
    baseUri: https://api.lemonsqueezy.com
    description: Lemon Squeezy License API business capability. Self-contained, no shared references.
    resources:
    - name: v1-licenses-activate
      path: /v1/licenses/activate
      operations:
      - name: post
        method: POST
        description: Lemon Squeezy Activate a license key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-licenses-deactivate
      path: /v1/licenses/deactivate
      operations:
      - name: post
        method: POST
        description: Lemon Squeezy Deactivate a license key instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-licenses-validate
      path: /v1/licenses/validate
      operations:
      - name: post
        method: POST
        description: Lemon Squeezy Validate a license key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: license-rest
    port: 8080
    description: REST adapter for Lemon Squeezy License API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/licenses/activate
      name: v1-licenses-activate
      description: REST surface for v1-licenses-activate.
      operations:
      - method: POST
        name: post
        description: Lemon Squeezy Activate a license key
        call: license.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/licenses/deactivate
      name: v1-licenses-deactivate
      description: REST surface for v1-licenses-deactivate.
      operations:
      - method: POST
        name: post
        description: Lemon Squeezy Deactivate a license key instance
        call: license.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/licenses/validate
      name: v1-licenses-validate
      description: REST surface for v1-licenses-validate.
      operations:
      - method: POST
        name: post
        description: Lemon Squeezy Validate a license key
        call: license.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: license-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lemon Squeezy License API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lemon-squeezy-activate-license-key
      description: Lemon Squeezy Activate a license key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: license.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lemon-squeezy-deactivate-license-key
      description: Lemon Squeezy Deactivate a license key instance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: license.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lemon-squeezy-validate-license-key
      description: Lemon Squeezy Validate a license key
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: license.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
