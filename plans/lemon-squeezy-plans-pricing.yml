        name: payout_us
        type: metered
        metric: payout
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: International bank payout
        name: payout_intl
        type: metered
        metric: payout
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 1%
        userMultiplied: false
