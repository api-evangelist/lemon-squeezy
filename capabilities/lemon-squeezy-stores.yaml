naftiko: 1.0.0-alpha2
info:
  label: Lemon Squeezy API — Stores
  description: 'Lemon Squeezy API — Stores. 2 operations. Lead operation: Lemon Squeezy List all stores. Self-contained Naftiko
    capability covering one Lemon Squeezy business surface.'
  tags:
  - Lemon Squeezy
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LEMON_SQUEEZY_API_KEY: LEMON_SQUEEZY_API_KEY
capability:
  consumes:
  - type: http
    namespace: lemon-squeezy-stores
    baseUri: https://api.lemonsqueezy.com
    description: Lemon Squeezy API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: v1-stores
      path: /v1/stores
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy List all stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-stores-1
      path: /v1/stores/1
      operations:
      - name: get
        method: GET
        description: Lemon Squeezy Retrieve a store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LEMON_SQUEEZY_API_KEY}}'
  exposes:
  - type: rest
    namespace: lemon-squeezy-stores-rest
    port: 8080
    description: REST adapter for Lemon Squeezy API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/stores
      name: v1-stores
      description: REST surface for v1-stores.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy List all stores
        call: lemon-squeezy-stores.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/stores/1
      name: v1-stores-1
      description: REST surface for v1-stores-1.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy Retrieve a store
        call: lemon-squeezy-stores.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lemon-squeezy-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lemon Squeezy API — Stores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lemon-squeezy-list-all-stores
      description: Lemon Squeezy List all stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-stores.get
      outputParameters:
      - type: object
        mapping: $.
    - name: lemon-squeezy-retrieve-store
      description: Lemon Squeezy Retrieve a store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-stores.get
      outputParameters:
      - type: object
        mapping: $.
