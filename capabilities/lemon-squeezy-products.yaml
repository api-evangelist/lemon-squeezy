    resources:
    - path: /v1/v1/products
      name: v1-products
      description: REST surface for v1-products.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy List all products
        call: lemon-squeezy-products.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/products/1
      name: v1-products-1
      description: REST surface for v1-products-1.
      operations:
      - method: GET
        name: get
        description: Lemon Squeezy Retrieve a product
        call: lemon-squeezy-products.get
        outputParameters:
        - type: object
          mapping: $.
