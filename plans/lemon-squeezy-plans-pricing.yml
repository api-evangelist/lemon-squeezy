plans:
  - id: lemon-squeezy-payg
    name: Pay As You Go
    type: usage-based
    description: 5% + 50¢ per transaction; no monthly fee.
    entries:
      - label: Base transaction fee
        name: base
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 5% + $0.50
        userMultiplied: false
      - label: International surcharge
        name: intl
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +1.5%
        userMultiplied: false
      - label: PayPal payments
        name: paypal
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +1.5%
        userMultiplied: false
      - label: Subscription payments
        name: sub
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +0.5%
        userMultiplied: false
      - label: Abandoned cart recovery
        name: cart
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +5%
        userMultiplied: false
      - label: Affiliate referrals
        name: affiliate
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: +3%
        userMultiplied: false
