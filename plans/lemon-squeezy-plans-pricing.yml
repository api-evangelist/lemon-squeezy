      - name: Merchant of Record (handles tax/compliance)
      - name: No monthly fee
      - name: Pay only on sales
  - id: lemon-squeezy-custom
    name: Custom (Volume)
    type: enterprise
    description: '$25K-$50K/mo+ revenue: contact for volume rate.'
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
