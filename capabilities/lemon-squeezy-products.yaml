    port: 9090
    transport: http
    description: MCP adapter for Lemon Squeezy API — Products. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: lemon-squeezy-list-all-products
      description: Lemon Squeezy List all products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-products.get
      outputParameters:
      - type: object
        mapping: $.
    - name: lemon-squeezy-retrieve-product
      description: Lemon Squeezy Retrieve a product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lemon-squeezy-products.get
      outputParameters:
      - type: object
        mapping: $.
